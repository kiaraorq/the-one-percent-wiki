<div class="wrap">
  <div class="page-head"><h1>Insights</h1>
    <p>Patterns across the researched champions: the strategies they actually use, the most common
    profile tags, and where they come from. Based on completed research reports.</p></div>
  <div id="stage" style="margin-top:8px"></div>
  <div class="footer" id="foot"></div>
</div>

<script>
(function(){
  const {people} = OP;
  const done = people.filter(p=>p.status==="done");
  const stage = document.getElementById("stage");

  if(!done.length){
    stage.innerHTML = `<div class="card empty"><b>No research completed yet.</b><br><br>
      Insights are built from the tags found during research. Run
      <b>python wctc_research.py run</b>, then <b>export-json</b>, and reload.</div>`;
    OP.boot(); return;
  }

  // strategy tags = the style vocabulary the model assigns from research
  const STRATEGY = ["systematic","algorithmic","discretionary","technical-analysis",
                    "fundamental","day-trading","swing-trading"];
  const freq = list => {
    const f={};
    list.forEach(p=>(p.tags||[]).forEach(t=>f[t]=(f[t]||0)+1));
    return f;
  };
  const tagFreq = freq(done);
  const strategies = STRATEGY.map(t=>[t,tagFreq[t]||0]).filter(([,n])=>n>0)
                             .sort((a,b)=>b[1]-a[1]);
  const commonTags = Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const countries = {};
  done.forEach(p=>{ if(p.country && p.country!=="Unknown") countries[p.country]=(countries[p.country]||0)+1; });
  const countryRows = Object.entries(countries).sort((a,b)=>b[1]-a[1]).slice(0,12);

  const bars = (rows, denom) => rows.map(([lbl,n])=>`
    <div class="barrow">
      <span class="lbl" title="${lbl}">${lbl.replace(/-/g," ")}</span>
      <span class="track"><span class="fill" style="width:${Math.round(n/denom*100)}%"></span></span>
      <span class="n num">${n}</span>
    </div>`).join("");

  const maxS = strategies.length?strategies[0][1]:1;
  const maxT = commonTags.length?commonTags[0][1]:1;
  const maxC = countryRows.length?countryRows[0][1]:1;

  stage.innerHTML = `
    <div class="kpis">
      <div class="card kpi"><div class="ic"><i data-lucide="file-search" class="lucide"></i></div>
        <div><div class="k">Reports analyzed</div><div class="v num">${done.length}</div></div></div>
      <div class="card kpi"><div class="ic"><i data-lucide="tags" class="lucide"></i></div>
        <div><div class="k">Distinct tags found</div><div class="v num">${Object.keys(tagFreq).length}</div></div></div>
      <div class="card kpi"><div class="ic"><i data-lucide="globe" class="lucide"></i></div>
        <div><div class="k">Countries represented</div><div class="v num">${Object.keys(countries).length}</div></div></div>
    </div>

    <div class="card" style="margin-top:18px">
      <div class="section-title"><i data-lucide="target" class="lucide"></i>Trading strategies in use</div>
      <div class="bars">${strategies.length?bars(strategies,maxS):
        `<div class="empty">No strategy tags yet — they appear as research completes.</div>`}</div>
    </div>

    <div class="card" style="margin-top:18px">
      <div class="section-title"><i data-lucide="tags" class="lucide"></i>Most common tags</div>
      <div class="bars">${bars(commonTags,maxT)}</div>
    </div>

    <div class="card" style="margin-top:18px;margin-bottom:6px">
      <div class="section-title"><i data-lucide="globe" class="lucide"></i>Countries</div>
      <div class="bars">${countryRows.length?bars(countryRows,maxC):
        `<div class="empty">Countries appear as research completes.</div>`}</div>
    </div>`;
  document.getElementById("foot").textContent =
    `Counts reflect the ${done.length} researched champions; pending traders are excluded.`;
  OP.boot();
})();
</script>
</body>
</html>
