<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights · The One Percent</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="manifest" href="icons/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="lucide.min.js"></script>
<script>if(!window.lucide){var s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/lucide@0.299.0/dist/umd/lucide.min.js";s.onload=function(){lucide.createIcons()};document.head.appendChild(s);}</script>
<script src="wctc_data.js"></script>
<script src="app-common.js"></script>
</head>
<body>
<nav><div class="nav-in">
  <a class="mark" href="index.html"><img class="mono" src="icons/apple-touch-icon.png" alt="1%">The One Percent</a>
  <div class="nav-links">
    <a href="index.html"><i data-lucide="home" class="lucide"></i><span>Home</span></a>
    <a href="podiums.html"><i data-lucide="trophy" class="lucide"></i><span>Podiums</span></a>
    <a href="insights.html"><i data-lucide="bar-chart-3" class="lucide"></i><span>Insights</span></a>
    <a href="explorer.html"><i data-lucide="table-2" class="lucide"></i><span>Explorer</span></a>
    <a href="prompts.html"><i data-lucide="sparkles" class="lucide"></i><span>Prompts</span></a>
  </div>
  <div class="profile">
    <button class="profile-btn" aria-expanded="false" aria-label="Profile menu">
      <i data-lucide="circle-user" class="lucide"></i>
      <i data-lucide="chevron-down" class="lucide chev"></i>
    </button>
    <div class="profile-menu">
      <a href="myroadmap.html"><i data-lucide="route" class="lucide"></i>My Roadmap</a>
      <button data-theme-toggle><i data-lucide="moon" class="lucide"></i>Dark theme</button>
    </div>
  </div>
</div></nav>

<div class="wrap">
  <div class="page-head"><h1>Podiums</h1>
    <p>Top performers ranked by best net return. Pick a market category, a year, or both.</p></div>
  <div class="controls">
    <div class="seg" id="disc-seg"></div>
    <label class="field"><i data-lucide="calendar" class="lucide"></i>
      <select id="year-sel"><option value="">All years</option></select></label>
  </div>
  <div id="stage"></div>
</div>

<script>
(function(){
  const {people, DISCIPLINES, fmtPct, bestWinFiltered} = OP;
  let disc = "", year = "";

  const seg = document.getElementById("disc-seg");
  const segBtns = [["","All markets","globe"], ...DISCIPLINES.map(([k,l])=>[k,l,
      k==="futures"?"candlestick-chart":k==="forex"?"repeat":k==="stocks"?"line-chart":"layers"])];
  seg.innerHTML = segBtns.map(([k,l,ic])=>
    `<button data-k="${k}" class="${k===disc?"on":""}"><i data-lucide="${ic}" class="lucide"></i>${l}</button>`).join("");
  seg.addEventListener("click",e=>{
    const b=e.target.closest("button"); if(!b) return;
    disc=b.dataset.k; [...seg.children].forEach(x=>x.classList.toggle("on",x===b)); render();
  });

  const ysel = document.getElementById("year-sel");
  OP.allYears.forEach(y=>{const o=document.createElement("option");o.value=y;o.textContent=y;ysel.appendChild(o);});
  ysel.addEventListener("change",()=>{year=ysel.value;render();});

  function render(){
    const ranked = people
      .map(p=>({p, win: bestWinFiltered(p, disc||null, year||null)}))
      .filter(x=>x.win)
      .sort((a,b)=>b.win.pct-a.win.pct);
    const stage = document.getElementById("stage");
    if(!ranked.length){
      stage.innerHTML = `<div class="card empty"><b>No results for this combination.</b><br>
        Some categories only exist in certain years — try widening a filter.</div>`;
      OP.boot(); return;
    }
    const top3 = ranked.slice(0,3);
    const order = [top3[1],top3[0],top3[2]];
    const cls = ["p2","p1","p3"], medal=["2","1","3"];
    const rest = ranked.slice(3,10);
    stage.innerHTML = `
      <div class="podium">
        ${order.map((x,i)=> x ? `
          <div class="step ${cls[i]}">
            <div class="who">
              <div class="medal"><i data-lucide="medal" class="lucide"></i></div>
              <div class="nm" title="${x.p.name}">${x.p.name}</div>
              <div class="ret num">+${fmtPct(x.win.pct)}%</div>
              <div class="sub" title="${x.win.event}">${x.win.year} · ${x.win.event}</div>
            </div>
            <div class="base">${medal[i]}</div>
          </div>` : `<div></div>`).join("")}
      </div>
      ${rest.length?`
      <div class="card ranks">
        <div class="section-title"><i data-lucide="list-ordered" class="lucide"></i>Next in line</div>
        ${rest.map((x,i)=>`
          <div class="rankrow">
            <span class="pos num">${i+4}</span>
            <span class="nm">${x.p.name}</span>
            <span class="ev">${x.win.year} · ${x.win.event}</span>
            <span class="ret num">+${fmtPct(x.win.pct)}%</span>
          </div>`).join("")}
      </div>`:""}`;
    OP.boot();
  }
  render();
})();
</script>
</body>
</html>
